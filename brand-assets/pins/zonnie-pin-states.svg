<?xml version="1.0" encoding="UTF-8"?>
<!--
  ZONNIE — Map pin master
  Italic T (16° sharp slant) with a sun disc on top
  
  Five states:
  - full-sun       (#D9633E)  — terracotta, brightest
  - mostly-sunny   (#E89C5A)  — peach
  - partial-sun    (#F4D58D)  — mustard
  - shade          (#7A2E14)  — cocoa
  - selected       (#FBA85A)  — bright orange + cream halo
  
  Each pin is a 40x44 viewBox glyph centred on its anchor (20, 22).
  Drop straight into Leaflet as a divIcon, or rasterise for native maps.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 56" width="240" height="56">
  
  <!-- ============ Full sun ============ -->
  <g transform="translate(20, 28)">
    <!-- sun -->
    <circle cx="4" cy="-12" r="3" fill="none" stroke="#2a1f15" stroke-width="1.2"/>
    <g stroke="#2a1f15" stroke-width="1" stroke-linecap="round" fill="none">
      <line x1="-5" y1="-12" x2="-3" y2="-12"/>
      <line x1="13" y1="-12" x2="11" y2="-12"/>
      <line x1="4" y1="-20" x2="4" y2="-18"/>
      <line x1="-2" y1="-18" x2="-1" y2="-17"/>
      <line x1="10" y1="-18" x2="9" y2="-17"/>
    </g>
    <!-- T (16° italic) -->
    <g transform="skewX(-16)" fill="#D9633E" stroke="none">
      <rect x="-13" y="-1" width="26" height="4"/>
      <rect x="-2" y="-1" width="4" height="29"/>
    </g>
  </g>
  
  <!-- ============ Mostly sunny ============ -->
  <g transform="translate(68, 28)">
    <circle cx="4" cy="-12" r="3" fill="none" stroke="#2a1f15" stroke-width="1.2"/>
    <g stroke="#2a1f15" stroke-width="1" stroke-linecap="round" fill="none">
      <line x1="-5" y1="-12" x2="-3" y2="-12"/>
      <line x1="13" y1="-12" x2="11" y2="-12"/>
      <line x1="4" y1="-20" x2="4" y2="-18"/>
      <line x1="-2" y1="-18" x2="-1" y2="-17"/>
      <line x1="10" y1="-18" x2="9" y2="-17"/>
    </g>
    <g transform="skewX(-16)" fill="#E89C5A" stroke="none">
      <rect x="-13" y="-1" width="26" height="4"/>
      <rect x="-2" y="-1" width="4" height="29"/>
    </g>
  </g>
  
  <!-- ============ Partial sun ============ -->
  <g transform="translate(116, 28)">
    <circle cx="4" cy="-12" r="3" fill="none" stroke="#2a1f15" stroke-width="1.2"/>
    <g stroke="#2a1f15" stroke-width="1" stroke-linecap="round" fill="none">
      <line x1="-5" y1="-12" x2="-3" y2="-12"/>
      <line x1="13" y1="-12" x2="11" y2="-12"/>
      <line x1="4" y1="-20" x2="4" y2="-18"/>
      <line x1="-2" y1="-18" x2="-1" y2="-17"/>
      <line x1="10" y1="-18" x2="9" y2="-17"/>
    </g>
    <g transform="skewX(-16)" fill="#F4D58D" stroke="#2a1f15" stroke-width="0.5">
      <rect x="-13" y="-1" width="26" height="4"/>
      <rect x="-2" y="-1" width="4" height="29"/>
    </g>
  </g>
  
  <!-- ============ Shade ============ -->
  <g transform="translate(164, 28)">
    <circle cx="4" cy="-12" r="3" fill="none" stroke="#2a1f15" stroke-width="1.2"/>
    <g stroke="#2a1f15" stroke-width="1" stroke-linecap="round" fill="none">
      <line x1="-5" y1="-12" x2="-3" y2="-12"/>
      <line x1="13" y1="-12" x2="11" y2="-12"/>
      <line x1="4" y1="-20" x2="4" y2="-18"/>
      <line x1="-2" y1="-18" x2="-1" y2="-17"/>
      <line x1="10" y1="-18" x2="9" y2="-17"/>
    </g>
    <g transform="skewX(-16)" fill="#7A2E14" stroke="none">
      <rect x="-13" y="-1" width="26" height="4"/>
      <rect x="-2" y="-1" width="4" height="29"/>
    </g>
  </g>
  
  <!-- ============ Selected ============ -->
  <g transform="translate(212, 28)">
    <!-- halo behind -->
    <ellipse cx="0" cy="6" rx="22" ry="22" fill="#FBA85A" opacity="0.20"/>
    <ellipse cx="0" cy="6" rx="16" ry="16" fill="#FFE5C2" opacity="0.55"/>
    <!-- sun -->
    <circle cx="4" cy="-12" r="3" fill="none" stroke="#2a1f15" stroke-width="1.4"/>
    <g stroke="#2a1f15" stroke-width="1.2" stroke-linecap="round" fill="none">
      <line x1="-5" y1="-12" x2="-3" y2="-12"/>
      <line x1="13" y1="-12" x2="11" y2="-12"/>
      <line x1="4" y1="-20" x2="4" y2="-18"/>
      <line x1="-2" y1="-18" x2="-1" y2="-17"/>
      <line x1="10" y1="-18" x2="9" y2="-17"/>
    </g>
    <g transform="skewX(-16)" fill="#FBA85A" stroke="#2a1f15" stroke-width="0.8">
      <rect x="-13" y="-1" width="26" height="4"/>
      <rect x="-2" y="-1" width="4" height="29"/>
    </g>
  </g>
</svg>
